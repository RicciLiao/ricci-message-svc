spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DATABASE_URL}/message
    username: ${DATABASE_USER_NAME}
    password: ${DATABASE_USER_PASSWORD}
    hikari:
      max-lifetime: 30000
      maximum-pool-size: 20
      minimum-idle: 2
      idle-timeout: 10000
      connection-timeout: 15000
      register-mbeans: true
      connection-test-query: select 1 from dual
      leak-detection-threshold: 30000
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
ricciliao:
  x:
    common:
      consumer: message
      springdoc:
        title: Message
        description: Message Service
        summary: 🎖 Inspiration
        enable: true
    log:
      executor:
        enable: true
    mcp:
      url: http://192.168.165.34:8083/operation
      operation-list:
        - store: code
          data-type: ricciliao.message.cache.pojo.MessageCodeCacheDto

